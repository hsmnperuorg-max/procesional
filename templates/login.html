{% extends "base.html" %}
{% block title %}Iniciar Sesión{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-split">
    <div class="login-brand" style="background-image:url('{{ url_for('static', filename='img/login.png') }}')"></div>
    <div class="login-form-side">
      <div class="login-box">
        <div class="login-logo">
          <h1>Señor de los Milagros</h1>
          <p>Sistema Integral de Control Procesional</p>
        </div>
        {% if error %}
        <div class="alert alert-error"><i class="fa fa-circle-exclamation"></i> {{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
          <div class="form-group" style="margin-bottom:16px">
            <label>Usuario</label>
            <input type="text" name="usuario" placeholder="Ingresa tu usuario" required autofocus>
          </div>
          <div class="form-group" style="margin-bottom:24px">
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">
            <i class="fa fa-right-to-bracket"></i> Ingresar al Sistema
          </button>
        </form>
        <div style="margin-top:24px;padding-top:16px;border-top:1px solid #eee;font-size:12px;color:#999;text-align:center;">
          <strong>Usuarios de prueba:</strong><br>
          admin / admin123 &nbsp;|&nbsp; cronometro1 / cron123 &nbsp;|&nbsp; director / dir123
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
